<div class="container">
  <h2>{{ isEditMode ? 'Editar' : 'Novo' }} Empreendimento</h2>

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="nome_empreendimento">Nome do Empreendimento</label>
      <input id="nome_empreendimento" type="text" formControlName="nome_empreendimento" placeholder="Ex: Edifício Central">
      <div *ngIf="form.get('nome_empreendimento')?.touched && form.get('nome_empreendimento')?.invalid" class="error">
        Nome é obrigatório (mínimo 3 caracteres).
      </div>
    </div>

    <div class="form-group">
      <label for="nome_responsavel">Nome do Empreendedor Responsável</label>
      <input id="nome_responsavel" type="text" formControlName="nome_responsavel" placeholder="Ex: João Silva">
      <div *ngIf="form.get('nome_responsavel')?.touched && form.get('nome_responsavel')?.invalid" class="error">
        Nome do responsável é obrigatório (mínimo 3 caracteres).
      </div>
    </div>

    <div class="actions">
      <button type="submit" class="btn btn-primary" [disabled]="form.invalid">Salvar</button>
      <a routerLink="/" class="btn btn-secondary">Cancelar</a>
    </div>
  </form>
</div>
